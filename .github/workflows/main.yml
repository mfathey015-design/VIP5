name: Continuous Bot Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  host-bot:
    runs-on: ubuntu-latest
    
    concurrency:
      group: bot-running
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot flask psutil aiohttp

      - name: Run Dedicated Server
        run: |
          until python main.py; do
            echo "Process crashed with exit code $?. Respawning in 5 seconds..."
            sleep 5
          done
